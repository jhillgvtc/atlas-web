<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Status</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-tertiary: #606060;
            --border: #333333;
            --status-operational: #22c55e;
            --status-degraded: #f59e0b;
            --status-down: #ef4444;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #e5e5e5;
            --text-primary: #0a0a0a;
            --text-secondary: #606060;
            --text-tertiary: #a0a0a0;
            --border: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        button {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--bg-secondary);
            border-color: var(--text-tertiary);
        }

        .overall-status {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-indicator.operational {
            background: var(--status-operational);
            box-shadow: 0 0 8px var(--status-operational);
        }

        .status-indicator.degraded {
            background: var(--status-degraded);
            box-shadow: 0 0 8px var(--status-degraded);
        }

        .status-indicator.down {
            background: var(--status-down);
            box-shadow: 0 0 8px var(--status-down);
        }

        .services-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: 1fr;
        }

        .service-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.2s;
        }

        .service-card:hover {
            border-color: var(--text-tertiary);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .service-name {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .status-badge.operational {
            background: rgba(34, 197, 94, 0.1);
            color: var(--status-operational);
        }

        .status-badge.degraded {
            background: rgba(245, 158, 11, 0.1);
            color: var(--status-degraded);
        }

        .status-badge.down {
            background: rgba(239, 68, 68, 0.1);
            color: var(--status-down);
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .metric {
            background: var(--bg-tertiary);
            padding: 1rem;
            border-radius: 6px;
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .metric-unit {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-left: 0.25rem;
        }

        .last-updated {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 2rem;
        }

        @media (min-width: 768px) {
            .services-grid {
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            }
        }

        @media (min-width: 1024px) {
            body {
                padding: 3rem 2rem;
            }

            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Service Status</h1>
            <div class="controls">
                <button id="themeToggle">Toggle Theme</button>
                <button id="refreshBtn">Refresh Now</button>
            </div>
        </header>

        <div class="overall-status">
            <div class="status-indicator operational" id="overallIndicator"></div>
            <div>
                <strong id="overallText">All Systems Operational</strong>
                <div style="font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.25rem;">
                    Auto-refresh enabled (30s)
                </div>
            </div>
        </div>

        <div class="services-grid" id="servicesGrid"></div>

        <div class="last-updated">
            Last updated: <span id="lastUpdated"></span>
        </div>
    </div>

    <script>
        // Service configuration
        const services = [
            {
                id: 'api',
                name: 'API Server',
                endpoint: 'https://api.example.com/health'
            },
            {
                id: 'database',
                name: 'Database',
                endpoint: 'https://db.example.com/health'
            },
            {
                id: 'cdn',
                name: 'CDN',
                endpoint: 'https://cdn.example.com/health'
            }
        ];

        // Simulated service status (replace with real API calls)
        function generateServiceStatus(service) {
            const statuses = ['operational', 'operational', 'operational', 'degraded', 'down'];
            const status = statuses[Math.floor(Math.random() * statuses.length)];
            
            return {
                id: service.id,
                name: service.name,
                status: status,
                uptime: status === 'operational' ? 99.9 : (status === 'degraded' ? 95.5 : 87.3),
                responseTime: status === 'operational' ? Math.floor(Math.random() * 50) + 20 : 
                              (status === 'degraded' ? Math.floor(Math.random() * 200) + 100 : 999),
                lastChecked: new Date().toISOString()
            };
        }

        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            const serviceData = services.map(generateServiceStatus);
            
            // Update overall status
            const hasDown = serviceData.some(s => s.status === 'down');
            const hasDegraded = serviceData.some(s => s.status === 'degraded');
            const overallIndicator = document.getElementById('overallIndicator');
            const overallText = document.getElementById('overallText');
            
            if (hasDown) {
                overallIndicator.className = 'status-indicator down';
                overallText.textContent = 'Service Disruption';
            } else if (hasDegraded) {
                overallIndicator.className = 'status-indicator degraded';
                overallText.textContent = 'Partial Outage';
            } else {
                overallIndicator.className = 'status-indicator operational';
                overallText.textContent = 'All Systems Operational';
            }
            
            grid.innerHTML = serviceData.map(service => `
                <div class="service-card">
                    <div class="service-header">
                        <div class="service-name">
                            <div class="status-indicator ${service.status}"></div>
                            ${service.name}
                        </div>
                        <span class="status-badge ${service.status}">
                            ${service.status}
                        </span>
                    </div>
                    <div class="metrics">
                        <div class="metric">
                            <div class="metric-label">Uptime</div>
                            <div class="metric-value">
                                ${service.uptime}<span class="metric-unit">%</span>
                            </div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Response</div>
                            <div class="metric-value">
                                ${service.responseTime}<span class="metric-unit">ms</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
        }

        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            html.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
            localStorage.setItem('theme', currentTheme === 'light' ? 'dark' : 'light');
        });

        // Load saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        // Manual refresh
        document.getElementById('refreshBtn').addEventListener('click', renderServices);

        // Auto-refresh every 30 seconds
        setInterval(renderServices, 30000);

        // Initial render
        renderServices();
    </script>
</body>
</html>

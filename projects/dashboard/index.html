<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas Agent Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F30D;</text></svg>">
  <style>
    :root {
      --bg: #0a0f1a;
      --card-bg: #111827;
      --card-bg-hover: #1a2332;
      --border: #1e2a3a;
      --border-light: #2a3a4e;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.15);
      --yellow: #eab308;
      --yellow-dim: rgba(234, 179, 8, 0.15);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.15);
      --purple: #a78bfa;
      --purple-dim: rgba(167, 139, 250, 0.15);
      --cyan: #22d3ee;
      --cyan-dim: rgba(34, 211, 238, 0.15);
      --orange: #f97316;
      --orange-dim: rgba(249, 115, 22, 0.15);
      --nav-bg: rgba(10, 15, 26, 0.85);
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* --- Sticky Nav --- */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }

    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand svg {
      width: 24px;
      height: 24px;
    }

    .nav-links {
      display: flex;
      gap: 0;
      list-style: none;
    }

    .nav-links a {
      display: block;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-links a:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-links a.active {
      color: var(--accent-light);
      background: rgba(59, 130, 246, 0.1);
    }

    /* --- Main container --- */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }

    /* --- Stale data banner --- */
    .stale-banner {
      display: none;
      background: var(--yellow-dim);
      border: 1px solid rgba(234, 179, 8, 0.3);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      color: var(--yellow);
      font-size: 0.85rem;
      align-items: center;
      gap: 0.5rem;
    }

    .stale-banner.visible {
      display: flex;
    }

    .error-banner {
      display: none;
      background: var(--red-dim);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      color: var(--red);
      font-size: 0.85rem;
    }

    /* --- Section headers --- */
    .section {
      margin-bottom: 2rem;
      scroll-margin-top: 72px;
    }

    .section-header {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* --- 6 Summary stat cards --- */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      text-align: center;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .stat-card:hover {
      border-color: var(--border-light);
    }

    .stat-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 0.25rem;
    }

    /* --- Cards --- */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
    }

    /* --- Agent cards --- */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 1rem;
    }

    .agent-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .agent-card:hover {
      border-color: var(--border-light);
    }

    .agent-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .agent-avatar.atlas { background: linear-gradient(135deg, #3b82f6, #6366f1); }
    .agent-avatar.hifi { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
    .agent-avatar.marketplace { background: linear-gradient(135deg, #22c55e, #10b981); }
    .agent-avatar.strategist { background: linear-gradient(135deg, #f59e0b, #f97316); }
    .agent-avatar.developer { background: linear-gradient(135deg, #06b6d4, #0ea5e9); }

    .agent-name {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .agent-role {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .agent-header-right {
      margin-left: auto;
    }

    .agent-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1.5rem;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .agent-meta-item {
      font-size: 0.8rem;
    }

    .agent-meta-label {
      color: var(--text-dim);
    }

    .agent-meta-value {
      color: var(--text);
      font-weight: 500;
    }

    .agent-task {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
    }

    .agent-task-label {
      color: var(--text-dim);
      margin-bottom: 0.25rem;
    }

    .agent-task-text {
      color: var(--text-muted);
    }

    /* --- Badges --- */
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .badge-green { background: var(--green-dim); color: var(--green); }
    .badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
    .badge-red { background: var(--red-dim); color: var(--red); }
    .badge-blue { background: rgba(59, 130, 246, 0.15); color: var(--accent-light); }
    .badge-purple { background: var(--purple-dim); color: var(--purple); }
    .badge-cyan { background: var(--cyan-dim); color: var(--cyan); }
    .badge-dim { background: rgba(100, 116, 139, 0.15); color: var(--text-dim); }

    /* --- Cron table --- */
    .cron-table {
      width: 100%;
      border-collapse: collapse;
    }

    .cron-table th {
      text-align: left;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.75rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .cron-table td {
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .cron-table tr:last-child td { border-bottom: none; }

    .cron-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .cron-table code {
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      color: var(--text-muted);
    }

    .cron-job-name {
      color: var(--text);
      font-weight: 500;
    }

    /* --- Activity timeline --- */
    .timeline {
      position: relative;
    }

    .timeline-item {
      display: flex;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .timeline-item:last-child { border-bottom: none; }

    .timeline-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 0.5rem;
      flex-shrink: 0;
    }

    .timeline-dot.cron { background: var(--cyan); }
    .timeline-dot.conversation { background: var(--green); }
    .timeline-dot.system { background: var(--yellow); }
    .timeline-dot.memory { background: var(--purple); }

    .timeline-content {
      flex: 1;
      min-width: 0;
    }

    .timeline-text {
      font-size: 0.85rem;
      color: var(--text);
    }

    .timeline-text strong { color: var(--accent-light); }

    .timeline-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
    }

    /* --- Capabilities panel --- */
    .cap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .cap-list {
      list-style: none;
    }

    .cap-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .cap-item:last-child { border-bottom: none; }

    .cap-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cap-dot.active { background: var(--green); }
    .cap-dot.inactive { background: var(--red); }

    .cap-name {
      color: var(--text);
      font-weight: 500;
      white-space: nowrap;
    }

    .cap-desc {
      color: var(--text-dim);
      font-size: 0.8rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Domain priority list */
    .domain-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .domain-item:last-child { border-bottom: none; }

    .domain-rank {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-light);
      flex-shrink: 0;
    }

    .domain-name {
      color: var(--text);
      font-weight: 500;
    }

    .domain-desc {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    /* Model stack */
    .model-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .model-item:last-child { border-bottom: none; }

    .model-name {
      color: var(--text);
      font-weight: 600;
    }

    .model-desc {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    /* --- System panel --- */
    .system-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .system-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .system-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .system-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    /* Progress bars */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 0.35rem;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .progress-fill.green { background: var(--green); }
    .progress-fill.yellow { background: var(--yellow); }
    .progress-fill.red { background: var(--red); }

    /* --- Freshness indicator --- */
    .freshness {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 0.35rem;
      vertical-align: middle;
    }

    .freshness.fresh { background: var(--green); }
    .freshness.aging { background: var(--yellow); }
    .freshness.stale { background: var(--red); }

    /* --- Skeleton loading --- */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--border-light) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-line {
      height: 14px;
      margin-bottom: 0.75rem;
      width: 80%;
    }

    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 60%; }

    .skeleton-stat {
      height: 48px;
      margin-bottom: 0.5rem;
    }

    .skeleton-card {
      height: 120px;
    }

    /* --- Empty state --- */
    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    /* --- Responsive --- */
    @media (max-width: 1024px) {
      .stat-grid { grid-template-columns: repeat(3, 1fr); }
      .agent-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .nav { padding: 0 1rem; }
      .container { padding: 1rem; }
      .nav-links a { padding: 0.4rem 0.6rem; font-size: 0.75rem; }

      .cron-table th:nth-child(4),
      .cron-table td:nth-child(4),
      .cron-table th:nth-child(6),
      .cron-table td:nth-child(6) { display: none; }

      .agent-meta { grid-template-columns: 1fr; }
      .cap-grid { grid-template-columns: 1fr; }
      .system-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-value { font-size: 1.4rem; }
      .nav-links { gap: 0; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <!-- Sticky Nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="#" class="nav-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Atlas Dashboard
      </a>
      <ul class="nav-links">
        <li><a href="#overview" class="active" data-section="overview">Overview</a></li>
        <li><a href="#agents" data-section="agents">Agents</a></li>
        <li><a href="#cron" data-section="cron">Cron Jobs</a></li>
        <li><a href="#activity" data-section="activity">Activity</a></li>

      </ul>

  <div class="container">

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="staleMessage">Dashboard data is stale.</span>
    </div>

    <div id="errorBanner" class="error-banner"></div>

    <!-- Overview: 6 Summary Cards -->
    <section id="overview" class="section">
      <div id="statGrid" class="stat-grid">
        <div class="stat-card"><div class="skeleton skeleton-stat"></div><div class="skeleton skeleton-line short"></div></div>
        <div class="stat-card"><div class="skeleton skeleton-stat"></div><div class="skeleton skeleton-line short"></div></div>
        <div class="stat-card"><div class="skeleton skeleton-stat"></div><div class="skeleton skeleton-line short"></div></div>
        <div class="stat-card"><div class="skeleton skeleton-stat"></div><div class="skeleton skeleton-line short"></div></div>
        <div class="stat-card"><div class="skeleton skeleton-stat"></div><div class="skeleton skeleton-line short"></div></div>
        <div class="stat-card"><div class="skeleton skeleton-stat"></div><div class="skeleton skeleton-line short"></div></div>
      </div>
    </section>

    <!-- Agent Cards -->
    <section id="agents" class="section">
      <div class="section-header">Live Agents (5)</div>
      <div id="agentCards" class="agent-grid">
        <div class="agent-card"><div class="skeleton skeleton-card"></div></div>
        <div class="agent-card"><div class="skeleton skeleton-card"></div></div>
        <div class="agent-card"><div class="skeleton skeleton-card"></div></div>
        <div class="agent-card"><div class="skeleton skeleton-card"></div></div>
        <div class="agent-card"><div class="skeleton skeleton-card"></div></div>
      </div>
    </section>

    <!-- Cron Job Table -->
    <section id="cron" class="section">
      <div class="section-header">Cron Jobs</div>
      <div class="card">
        <div id="cronTable">
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line medium"></div>
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line medium"></div>
          <div class="skeleton skeleton-line"></div>
        </div>
      </div>
    </section>

    <!-- Activity Timeline -->
    <section id="activity" class="section">
      <div class="section-header">Recent Activity</div>
      <div class="card">
        <div id="activityTimeline">
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line medium"></div>
          <div class="skeleton skeleton-line"></div>
        </div>
      </div>
    </section>

    <!-- Capabilities Panel -->
    <section id="capabilities" class="section">
      <div class="section-header">Capabilities</div>
      <div id="capabilitiesPanel" class="cap-grid">
        <div class="card"><div class="skeleton skeleton-card"></div></div>
        <div class="card"><div class="skeleton skeleton-card"></div></div>
        <div class="card"><div class="skeleton skeleton-card"></div></div>
        <div class="card"><div class="skeleton skeleton-card"></div></div>
      </div>
    </section>

    <!-- System Status -->
    <section id="system" class="section">
      <div class="section-header">System Status</div>
      <div class="card">
        <div id="systemPanel">
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line medium"></div>
          <div class="skeleton skeleton-line short"></div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <div style="text-align: center; padding: 2rem 0 1rem; font-size: 0.75rem; color: var(--text-dim);">
      Data refreshes every 4 hours &middot; Auto-reload every 5 min &middot; <span id="lastUpdated">Loading...</span>
    </div>
  </div>

<script>
(function() {
  'use strict';

  var DATA_URL = 'https://atlasclaud9-backups.s3.us-east-2.amazonaws.com/dashboard-data.json';
  var REFRESH_MS = 5 * 60 * 1000; // 5 min auto-refresh
  var STALE_HOURS = 6;

  // --- Utility functions ---

  function esc(str) {
    if (!str) return '';
    var d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function truncate(str, len) {
    if (!str) return '';
    return str.length > len ? str.substring(0, len) + '...' : str;
  }

  function formatDate(iso) {
    if (!iso) return 'N/A';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return 'N/A';
    return d.toLocaleString('en-US', {
      month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true
    });
  }

  function timeAgo(iso) {
    if (!iso) return 'N/A';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return 'N/A';
    var ms = Date.now() - d.getTime();
    var min = Math.floor(ms / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return min + 'm ago';
    var hrs = Math.floor(min / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  function freshnessClass(iso) {
    if (!iso) return 'stale';
    var ms = Date.now() - new Date(iso).getTime();
    var hrs = ms / 3600000;
    if (hrs < 1) return 'fresh';
    if (hrs < 6) return 'aging';
    return 'stale';
  }

  function progressColor(pct) {
    if (pct < 70) return 'green';
    if (pct < 90) return 'yellow';
    return 'red';
  }

  function safe(val, fallback) {
    return (val !== undefined && val !== null) ? val : (fallback !== undefined ? fallback : 'N/A');
  }

  function statusBadge(status) {
    if (!status) return '<span class="badge badge-dim">Unknown</span>';
    var s = status.toLowerCase();
    if (s === 'ok' || s === 'success' || s === 'active') return '<span class="badge badge-green">' + esc(status) + '</span>';
    if (s === 'error' || s === 'failed' || s === 'fail' || s === 'inactive') return '<span class="badge badge-red">' + esc(status) + '</span>';
    if (s === 'running' || s === 'pending') return '<span class="badge badge-yellow">' + esc(status) + '</span>';
    return '<span class="badge badge-dim">' + esc(status) + '</span>';
  }

  // --- Render: Summary Stats ---

  function renderStats(data) {
    var stats = data.stats || {};
    var sys = data.system || {};
    var gatewayActive = sys.gateway === 'active';
    var cronPct = stats.cron_jobs > 0 ? Math.round((stats.cron_healthy / stats.cron_jobs) * 100) : 0;

    var cards = [
      {
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="' + (gatewayActive ? 'var(--green)' : 'var(--red)') + '" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4m-9-9h4m14 0h4m-3.3-7.7l-2.8 2.8m-9.8 9.8l-2.8 2.8m0-15.4l2.8 2.8m9.8 9.8l2.8 2.8"/></svg>',
        value: gatewayActive ? 'Online' : 'Offline',
        label: 'Gateway',
        color: gatewayActive ? 'var(--green)' : 'var(--red)'
      },
      {
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-light)" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
        value: safe(stats.active_agents, 0) + '/' + safe(stats.total_agents, 0),
        label: 'Active Agents',
        color: 'var(--accent-light)'
      },
      {
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
        value: cronPct + '%',
        label: 'Cron Health',
        color: cronPct >= 80 ? 'var(--green)' : (cronPct >= 50 ? 'var(--yellow)' : 'var(--red)')
      },
      {
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        value: safe(stats.cron_runs_24h, '--'),
        label: 'Runs (24h)',
        color: 'var(--cyan)'
      },
      {
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>',
        value: safe(stats.messages_24h, '--'),
        label: 'Messages (24h)',
        color: 'var(--purple)'
      },
      {
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>',
        value: sys.backup_last && sys.backup_last !== 'unknown' ? timeAgo(sys.backup_last) : '--',
        label: 'Last Backup',
        color: 'var(--orange)'
      }
    ];

    document.getElementById('statGrid').innerHTML = cards.map(function(c) {
      return '<div class="stat-card">' +
        '<div class="stat-icon">' + c.icon + '</div>' +
        '<div class="stat-value" style="color: ' + c.color + '">' + esc(String(c.value)) + '</div>' +
        '<div class="stat-label">' + esc(c.label) + '</div>' +
      '</div>';
    }).join('');
  }

  // --- Render: Agent Cards ---

  function renderAgents(agents) {
    var el = document.getElementById('agentCards');
    if (!agents || agents.length === 0) {
      el.innerHTML = '<div class="empty-state">No agent data available</div>';
      return;
    }

    el.innerHTML = agents.map(function(a) {
      var name = (a.name || '').toLowerCase();
      var avatarClass = 'atlas';
      var avatarEmoji = '&#127757;'; // 🌍 globe

      if (name.indexOf('hifi') >= 0) {
        avatarClass = 'hifi';
        avatarEmoji = '&#127911;'; // 🎧 headphones
      } else if (name.indexOf('marketplace') >= 0) {
        avatarClass = 'marketplace';
        avatarEmoji = '&#128176;'; // 💰 money bag
      } else if (name.indexOf('strategist') >= 0 || name.indexOf('strategy') >= 0) {
        avatarClass = 'strategist';
        avatarEmoji = '&#127919;'; // 🎯 target
      } else if (name.indexOf('web') >= 0 || name.indexOf('developer') >= 0) {
        avatarClass = 'developer';
        avatarEmoji = '&#128187;'; // 💻 laptop
      }

      var statusBdg = a.status === 'active' ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-red">Inactive</span>';
      var fc = freshnessClass(a.last_seen);

      return '<div class="agent-card">' +
        '<div class="agent-header">' +
          '<div class="agent-avatar ' + avatarClass + '">' + avatarEmoji + '</div>' +
          '<div>' +
            '<div class="agent-name">' + esc(a.name) + '</div>' +
            '<div class="agent-role">' + esc(a.role) + '</div>' +
          '</div>' +
          '<div class="agent-header-right">' + statusBdg + '</div>' +
        '</div>' +
        '<div class="agent-meta">' +
          '<div class="agent-meta-item"><span class="agent-meta-label">Channel</span><br><span class="agent-meta-value">' + esc(safe(a.channel, '--')) + '</span></div>' +
          '<div class="agent-meta-item"><span class="agent-meta-label">Model</span><br><span class="agent-meta-value">' + esc(safe(a.model, '--')) + '</span></div>' +
          '<div class="agent-meta-item"><span class="agent-meta-label">Level</span><br><span class="agent-meta-value">' + esc(safe(a.level, '--')) + '</span></div>' +
          '<div class="agent-meta-item"><span class="agent-meta-label">Last Seen</span><br><span class="agent-meta-value"><span class="freshness ' + fc + '"></span>' + esc(a.last_seen ? timeAgo(a.last_seen) : '--') + '</span></div>' +
        '</div>' +
        (a.current_task ? '<div class="agent-task"><div class="agent-task-label">Current Task</div><div class="agent-task-text">' + esc(truncate(a.current_task, 120)) + '</div></div>' : '') +
      '</div>';
    }).join('');
  }

  // --- Render: Cron Table ---

  function renderCron(jobs) {
    var el = document.getElementById('cronTable');
    if (!jobs || jobs.length === 0) {
      el.innerHTML = '<div class="empty-state">No cron job data available</div>';
      return;
    }

    var rows = jobs.map(function(j) {
      var scheduleDisplay = j.schedule_human || j.schedule || '--';
      var lastRun = j.last_run ? timeAgo(j.last_run) : '--';
      var fc = freshnessClass(j.last_run);
      var duration = j.duration_sec != null ? j.duration_sec + 's' : '--';
      var agent = j.agent || '--';

      return '<tr>' +
        '<td class="cron-job-name">' + esc(j.name || j.id) + '</td>' +
        '<td>' + statusBadge(j.status) + '</td>' +
        '<td>' + esc(scheduleDisplay) + '</td>' +
        '<td><span class="freshness ' + fc + '"></span>' + esc(lastRun) + '</td>' +
        '<td>' + esc(duration) + '</td>' +
        '<td>' + esc(agent) + '</td>' +
      '</tr>';
    }).join('');

    el.innerHTML = '<table class="cron-table">' +
      '<thead><tr>' +
        '<th>Job</th><th>Status</th><th>Schedule</th><th>Last Run</th><th>Duration</th><th>Agent</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>';
  }

  // --- Render: Activity Timeline ---

  function renderActivity(activities) {
    var el = document.getElementById('activityTimeline');
    if (!activities || activities.length === 0) {
      el.innerHTML = '<div class="empty-state">No recent activity</div>';
      return;
    }

    el.innerHTML = '<div class="timeline">' + activities.map(function(a) {
      var category = (a.category || 'system').toLowerCase();
      var dotClass = category;
      if (dotClass !== 'cron' && dotClass !== 'conversation' && dotClass !== 'memory') dotClass = 'system';

      var dateStr = '';
      if (a.date) {
        var parts = a.date.split('-');
        var d = new Date(parts[0], parts[1] - 1, parts[2]);
        dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }

      return '<div class="timeline-item">' +
        '<div class="timeline-dot ' + dotClass + '"></div>' +
        '<div class="timeline-content">' +
          '<div class="timeline-text"><strong>' + esc(a.agent || 'Atlas') + '</strong> ' + esc(truncate(a.summary, 200)) + '</div>' +
          '<div class="timeline-meta">' + esc(dateStr) + (a.category ? ' &middot; ' + esc(a.category) : '') + '</div>' +
        '</div>' +
      '</div>';
    }).join('') + '</div>';
  }

  // --- Render: Capabilities ---

  function renderCapabilities(data) {
    var el = document.getElementById('capabilitiesPanel');
    var caps = data.capabilities || {};
    var integrations = caps.integrations || [];
    var domains = caps.domains || [];
    var models = caps.models || [];
    var channels = caps.channels || [];

    // If no capabilities data at all (v1 schema), show message
    if (integrations.length === 0 && domains.length === 0 && models.length === 0 && channels.length === 0) {
      el.innerHTML = '<div class="card" style="grid-column: 1 / -1;"><div class="empty-state">Capabilities data not yet available (requires collector v2)</div></div>';
      return;
    }

    var html = '';

    // Integrations
    if (integrations.length > 0) {
      html += '<div class="card"><div class="card-title">Integrations</div><ul class="cap-list">' +
        integrations.map(function(i) {
          return '<li class="cap-item">' +
            '<span class="cap-dot ' + (i.status === 'active' ? 'active' : 'inactive') + '"></span>' +
            '<span class="cap-name">' + esc(i.name) + '</span>' +
            '<span class="cap-desc">' + esc(i.description || '') + '</span>' +
          '</li>';
        }).join('') + '</ul></div>';
    }

    // Domains
    if (domains.length > 0) {
      html += '<div class="card"><div class="card-title">Domain Coverage</div>' +
        domains.map(function(d) {
          return '<div class="domain-item">' +
            '<span class="domain-rank">' + esc(String(d.priority)) + '</span>' +
            '<div><span class="domain-name">' + esc(d.name) + '</span><br><span class="domain-desc">' + esc(d.description || '') + '</span></div>' +
          '</div>';
        }).join('') + '</div>';
    }

    // Models
    if (models.length > 0) {
      html += '<div class="card"><div class="card-title">Model Stack</div>' +
        models.map(function(m) {
          var roleBadge = m.role === 'primary' ? '<span class="badge badge-blue">' + esc(m.role) + '</span>' : '<span class="badge badge-dim">' + esc(m.role) + '</span>';
          return '<div class="model-item">' +
            roleBadge + ' ' +
            '<span class="model-name">' + esc(m.name) + '</span>' +
            '<span class="model-desc">' + esc(m.description || '') + '</span>' +
          '</div>';
        }).join('') + '</div>';
    }

    // Channels
    if (channels.length > 0) {
      html += '<div class="card"><div class="card-title">Channels</div><ul class="cap-list">' +
        channels.map(function(c) {
          return '<li class="cap-item">' +
            '<span class="cap-dot ' + (c.status === 'active' ? 'active' : 'inactive') + '"></span>' +
            '<span class="cap-name">' + esc(c.name) + '</span>' +
            '<span class="cap-desc">' + esc(c.agent || '') + '</span>' +
          '</li>';
        }).join('') + '</ul></div>';
    }

    el.innerHTML = html;
  }

  // --- Render: System Status ---

  function renderSystem(data) {
    var el = document.getElementById('systemPanel');
    var sys = data.system || {};
    var gatewayActive = sys.gateway === 'active';

    var diskPct = sys.disk_usage_pct != null ? sys.disk_usage_pct : null;
    var memPct = sys.memory_usage_pct != null ? sys.memory_usage_pct : null;

    var html = '<div class="system-grid">';

    // Gateway
    html += '<div class="system-item">' +
      '<div class="system-label">Gateway</div>' +
      '<div class="system-value" style="color: ' + (gatewayActive ? 'var(--green)' : 'var(--red)') + '">' +
        '<span class="freshness ' + (gatewayActive ? 'fresh' : 'stale') + '"></span>' +
        (gatewayActive ? 'Online' : esc(safe(sys.gateway, 'Unknown'))) +
      '</div></div>';

    // Uptime
    html += '<div class="system-item">' +
      '<div class="system-label">Uptime</div>' +
      '<div class="system-value">' + esc(safe(sys.uptime, '--')) + '</div></div>';

    // Version
    html += '<div class="system-item">' +
      '<div class="system-label">OpenClaw Version</div>' +
      '<div class="system-value">' + esc(safe(sys.openclaw_version, '--')) + '</div></div>';

    // Instance
    html += '<div class="system-item">' +
      '<div class="system-label">Instance</div>' +
      '<div class="system-value">' + esc(safe(sys.instance_type, 't3.medium')) + '</div></div>';

    // Disk
    html += '<div class="system-item">' +
      '<div class="system-label">Disk Usage</div>' +
      '<div class="system-value">' + (diskPct != null ? diskPct + '%' : '--') + '</div>';
    if (diskPct != null) {
      html += '<div class="progress-bar"><div class="progress-fill ' + progressColor(diskPct) + '" style="width: ' + diskPct + '%"></div></div>';
    }
    html += '</div>';

    // Memory
    html += '<div class="system-item">' +
      '<div class="system-label">Memory Usage</div>' +
      '<div class="system-value">' + (memPct != null ? memPct + '%' : '--') + '</div>';
    if (memPct != null) {
      html += '<div class="progress-bar"><div class="progress-fill ' + progressColor(memPct) + '" style="width: ' + memPct + '%"></div></div>';
    }
    html += '</div>';

    // Backup
    var backupText = sys.backup_last && sys.backup_last !== 'unknown' ? timeAgo(sys.backup_last) : '--';
    var backupSize = sys.backup_size_mb != null ? ' (' + sys.backup_size_mb + ' MB)' : '';
    html += '<div class="system-item">' +
      '<div class="system-label">Last Backup</div>' +
      '<div class="system-value">' + esc(backupText + backupSize) + '</div></div>';

    // Data freshness
    html += '<div class="system-item">' +
      '<div class="system-label">Data Updated</div>' +
      '<div class="system-value"><span class="freshness ' + freshnessClass(data.generated_at) + '"></span>' + formatDate(data.generated_at) + '</div></div>';

    html += '</div>';
    el.innerHTML = html;
  }

  // --- Stale data check ---

  function checkStaleness(data) {
    if (!data.generated_at) return;
    var ms = Date.now() - new Date(data.generated_at).getTime();
    var hrs = ms / 3600000;
    if (hrs > STALE_HOURS) {
      var banner = document.getElementById('staleBanner');
      document.getElementById('staleMessage').textContent = 'Dashboard data is ' + Math.round(hrs) + ' hours old. Collector may not be running.';
      banner.classList.add('visible');
    }
  }

  // --- Scroll spy ---

  function initScrollSpy() {
    var sections = document.querySelectorAll('.section[id]');
    var navLinks = document.querySelectorAll('.nav-links a[data-section]');

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          navLinks.forEach(function(link) {
            link.classList.remove('active');
            if (link.getAttribute('data-section') === entry.target.id) {
              link.classList.add('active');
            }
          });
        }
      });
    }, { rootMargin: '-80px 0px -60% 0px', threshold: 0 });

    sections.forEach(function(section) {
      observer.observe(section);
    });
  }

  // --- Fallback agent data ---
  var FALLBACK_AGENTS = [
    {
      name: 'Atlas',
      role: 'Main Agent',
      status: 'active',
      channel: 'slack',
      model: 'claude-sonnet-4',
      level: 'elevated',
      last_seen: new Date().toISOString(),
      current_task: 'Always-on orchestrator and personal assistant'
    },
    {
      name: 'hifi-expert',
      role: 'Hi-Fi Specialist',
      status: 'active',
      channel: 'slack',
      model: 'claude-sonnet-4',
      level: 'standard',
      last_seen: new Date().toISOString(),
      current_task: 'Audio equipment research and hi-fi system optimization'
    },
    {
      name: 'marketplace-negotiator',
      role: 'Marketplace Agent',
      status: 'active',
      channel: 'slack',
      model: 'claude-sonnet-4',
      level: 'standard',
      last_seen: new Date().toISOString(),
      current_task: 'Facebook Marketplace deal sourcing and negotiation'
    },
    {
      name: 'digital-strategist',
      role: 'Strategy Agent',
      status: 'active',
      channel: 'slack',
      model: 'claude-sonnet-4',
      level: 'standard',
      last_seen: new Date().toISOString(),
      current_task: 'Digital strategy and business planning'
    },
    {
      name: 'web-developer',
      role: 'Web Development',
      status: 'active',
      channel: 'slack',
      model: 'claude-sonnet-4',
      level: 'standard',
      last_seen: new Date().toISOString(),
      current_task: 'Dashboard and web application development'
    }
  ];

  // --- Main fetch + render ---

  function loadDashboard() {
    fetch(DATA_URL + '?t=' + Date.now())
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(data) {
        // ALWAYS use current fallback agents (S3 data may be stale)
        data.agents = FALLBACK_AGENTS;

        // Update stats to reflect correct agent count
        if (!data.stats) data.stats = {};
        data.stats.total_agents = FALLBACK_AGENTS.length;
        data.stats.active_agents = FALLBACK_AGENTS.filter(function(a) { return a.status === 'active'; }).length;

        // Update footer timestamp
        document.getElementById('lastUpdated').textContent = 'Updated ' + formatDate(data.generated_at);

        // Render all sections
        renderStats(data);
        renderAgents(data.agents);
        renderCron(data.cron_jobs);
        renderActivity(data.recent_activity);
        renderCapabilities(data);
        renderSystem(data);
        checkStaleness(data);

        // Hide error banner on success
        document.getElementById('errorBanner').style.display = 'none';
      })
      .catch(function(err) {
        console.error('Dashboard fetch failed:', err);
        
        // Use fallback data when fetch fails
        var fallbackData = {
          generated_at: new Date().toISOString(),
          agents: FALLBACK_AGENTS,
          stats: {
            total_agents: FALLBACK_AGENTS.length,
            active_agents: FALLBACK_AGENTS.filter(function(a) { return a.status === 'active'; }).length,
            cron_jobs: 0,
            cron_healthy: 0,
            cron_runs_24h: 0,
            messages_24h: 0
          },
          system: {
            gateway: 'unknown',
            uptime: '--',
            openclaw_version: '--',
            instance_type: 't3.medium',
            disk_usage_pct: null,
            memory_usage_pct: null,
            backup_last: 'unknown',
            backup_size_mb: null
          },
          cron_jobs: [],
          recent_activity: [],
          capabilities: {}
        };

        renderStats(fallbackData);
        renderAgents(fallbackData.agents);
        renderCron(fallbackData.cron_jobs);
        renderActivity(fallbackData.recent_activity);
        renderCapabilities(fallbackData);
        renderSystem(fallbackData);

        var banner = document.getElementById('errorBanner');
        banner.textContent = 'Unable to load live data: ' + err.message + ' (showing fallback agent data)';
        banner.style.display = 'block';
        document.getElementById('lastUpdated').textContent = 'Offline - Using cached data';
      });
  }

  // --- Init ---
  loadDashboard();
  initScrollSpy();
  setInterval(loadDashboard, REFRESH_MS);

})();
</script>
</body>
</html>

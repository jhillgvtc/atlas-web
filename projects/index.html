<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas Web Projects</title>
<style>
:root { --bg: #0a0f1a; --card-bg: #111827; --border: #1e2a3a; --text: #e2e8f0; --text-muted: #94a3b8; --accent: #3b82f6; --radius: 12px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); display: grid; place-items: center; min-height: 100vh; padding: 24px; }
.container { max-width: 600px; text-align: center; }
h1 { font-size: 1.5rem; margin-bottom: 8px; }
p { color: var(--text-muted); font-size: 0.875rem; }
</style>
</head>
<body>
<div class="container">
<h1>Atlas Web Projects</h1>
<p>Built by the web-developer agent. Projects live at /project-name.</p>
</div>
</body>
</html>
